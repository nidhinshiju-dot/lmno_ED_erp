# ══════════════════════════════════════════════
# API Gateway — Production Spring Profile
# Activated via: SPRING_PROFILES_ACTIVE=prod
# ══════════════════════════════════════════════
server:
  port: ${PORT:8080}

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins: "*"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - PATCH
              - OPTIONS
            allowedHeaders: "*"
      routes:
        - id: core-service
          uri: ${CORE_SERVICE_URL}
          predicates:
            - Path=/api/v1/students/**,/api/v1/staff/**,/api/v1/classes/**,/api/v1/sections/**,/api/v1/schools/**,/api/v1/assistant/**,/api/v1/timetable/**,/api/v1/teacher/**,/api/v1/subjects/**,/api/v1/attendance/**,/api/v1/exams/**,/api/v1/announcements/**,/api/v1/notifications/**,/api/v1/files/**,/api/v1/reports/**,/api/v1/school-management/**,/api/v1/class-subjects/**,/api/v1/class-subject-teachers/**,/api/v1/schedule/**,/api/v1/substitutions/**,/api/v1/teacher-availability/**,/api/v1/rooms/**,/api/v1/credentials/**,/api/v1/whatsapp/**

        - id: lms-service
          uri: ${LMS_SERVICE_URL}
          predicates:
            - Path=/api/v1/courses/**,/api/v1/lessons/**,/api/v1/assignments/**,/api/v1/submissions/**,/api/v1/ai/**
            
        - id: auth-service
          uri: ${AUTH_SERVICE_URL}
          predicates:
            - Path=/api/v1/auth/**

        - id: fee-service
          uri: ${FEE_SERVICE_URL}
          predicates:
            - Path=/api/v1/fees/**,/api/v1/invoices/**,/api/v1/payments/**

logging:
  level:
    root: INFO
    org.springframework.cloud.gateway: WARN
    reactor.netty.http.client: WARN
