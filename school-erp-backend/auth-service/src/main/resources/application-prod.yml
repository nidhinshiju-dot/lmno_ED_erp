# Auth Service — Production Profile (Google Cloud Run Ready)
server:
  port: ${PORT:8080}

spring:
  application:
    name: auth-service
  datasource:
    # Google Cloud SQL TCP/Socket connection setup
    url: jdbc:postgresql:///${DB_NAME}?cloudSqlInstance=${CLOUD_SQL_INSTANCE}&socketFactory=com.google.cloud.sql.postgres.SocketFactory
    username: ${DB_USER}       # Injected via Cloud Run Secret Manager
    password: ${DB_PASSWORD}   # Injected via Cloud Run Secret Manager
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      # Critical for Cloud Run: Prevents service start failure if DB is initially unavailable
      initialization-fail-timeout: -1 
      connection-timeout: 20000
      max-lifetime: 1800000 
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false

jwt:
  secret: ${JWT_SECRET}
  expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    root: INFO
    com.schoolerp: INFO
    org.springframework.web: WARN
