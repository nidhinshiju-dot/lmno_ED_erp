# ══════════════════════════════════════════════
# Core Service — UAT Spring Profile
# Activated via: SPRING_PROFILES_ACTIVE=uat
# ══════════════════════════════════════════════
server:
  port: 8082

spring:
  application:
    name: core-service
  datasource:
    url: ${DB_URL:jdbc:postgresql://postgres-uat:5432/school_erp_uat}
    username: ${DB_USER:erp_uat_user}
    password: ${DB_PASSWORD:UatPass@2026}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  mail:
    host: ${MAIL_HOST:sandbox.smtp.mailtrap.io}
    port: ${MAIL_PORT:2525}
    username: ${MAIL_USER:test}
    password: ${MAIL_PASS:test}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

logging:
  level:
    com.schoolerp: DEBUG
    org.springframework.web: DEBUG
