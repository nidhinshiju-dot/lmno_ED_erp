# ══════════════════════════════════════════════
# Core Service — Production Spring Profile
# Activated via: SPRING_PROFILES_ACTIVE=prod
# ══════════════════════════════════════════════
server:
  port: ${PORT:8080}

spring:
  application:
    name: core-service
  datasource:
    # Google Cloud SQL TCP/Socket connection setup
    url: jdbc:postgresql:///${DB_NAME}?cloudSqlInstance=${CLOUD_SQL_INSTANCE}&socketFactory=com.google.cloud.sql.postgres.SocketFactory
    username: ${DB_USER}       # Injected via Cloud Run Secret Manager
    password: ${DB_PASSWORD}   # Injected via Cloud Run Secret Manager
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      # Critical for Cloud Run: Prevents service start failure if DB is initially unavailable
      initialization-fail-timeout: -1 
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate      # PROD: never auto-alter — fail fast if schema is wrong
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

  mail:
    host: ${MAIL_HOST}
    port: ${MAIL_PORT}
    username: ${MAIL_USER}
    password: ${MAIL_PASS}
    properties:
      mail.smtp.auth: true
      mail.smtp.starttls.enable: true

logging:
  level:
    root: INFO
    com.schoolerp: INFO
    org.springframework.web: WARN
    org.hibernate: WARN
