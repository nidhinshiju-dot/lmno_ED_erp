version: '3.8'

services:
  # PostgreSQL Database for microservices (Schema per tenant)
  postgres:
    image: postgres:15-alpine
    container_name: school-erp-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: school_erp
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - erp-network

  # PgAdmin for easy database management
  pgadmin:
    image: dpage/pgadmin4
    container_name: school-erp-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@school.app
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - erp-network

  # Kafka setup (Zookeeper + Broker) for Future Event-Driven Messaging
  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: school-erp-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    networks:
      - erp-network

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: school-erp-kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    networks:
      - erp-network

volumes:
  postgres_data:

networks:
  erp-network:
    driver: bridge
