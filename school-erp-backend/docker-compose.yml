version: '3.9'

services:

  postgres:
    image: postgres:15-alpine
    container_name: erp-local-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: school_erp
    ports:
      - "5432:5432"
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
      - ./init-db:/docker-entrypoint-initdb.d
    networks:
      - erp-local-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  api-gateway:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: api-gateway
    container_name: erp-local-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      JWT_SECRET: local_dev_super_secret_key_needs_to_be_long_12345
      # Overriding application-dev.yml localhost defaults to Docker internal DNS
      CORE_SERVICE_URL: http://core-service:8083
      AUTH_SERVICE_URL: http://auth-service:8081
      LMS_SERVICE_URL: http://lms-service:8082
      FEE_SERVICE_URL: http://fee-service:8084
    depends_on:
      - core-service
      - auth-service
      - lms-service
      - fee-service
    networks:
      - erp-local-network

  auth-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: auth-service
    container_name: erp-local-auth
    restart: unless-stopped
    ports:
      - "8081:8081"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:postgresql://postgres:5432/school_erp
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: local_dev_super_secret_key_needs_to_be_long_12345
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - erp-local-network

  core-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: core-service
    container_name: erp-local-core
    restart: unless-stopped
    ports:
      - "8083:8083"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:postgresql://postgres:5432/school_erp
      DB_USER: postgres
      DB_PASSWORD: postgres
      AUTH_SERVICE_URL: http://auth-service:8081
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - erp-local-network

  lms-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: lms-service
    container_name: erp-local-lms
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:postgresql://postgres:5432/school_erp
      DB_USER: postgres
      DB_PASSWORD: postgres
      AI_ENABLED: "false"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - erp-local-network

  fee-service:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        SERVICE: fee-service
    container_name: erp-local-fee
    restart: unless-stopped
    ports:
      - "8084:8084"
    environment:
      SPRING_PROFILES_ACTIVE: dev
      DB_URL: jdbc:postgresql://postgres:5432/school_erp
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - erp-local-network

volumes:
  postgres_local_data:

networks:
  erp-local-network:
    driver: bridge
