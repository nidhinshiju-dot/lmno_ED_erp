events {
    worker_connections 1024;
}

http {
    upstream api_gateway {
        server api-gateway:8080;
    }

    # ── HTTP → redirect to HTTPS ──────────────────────────────────────────
    server {
        listen 80;
        server_name schoolerp.app admin.schoolerp.app;
        return 301 https://$host$request_uri;
    }

    # ── Admin Portal (HTTPS) ──────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name admin.schoolerp.app;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;
        ssl_protocols       TLSv1.2 TLSv1.3;
        ssl_ciphers         HIGH:!aNULL:!MD5;

        # API calls proxy to Gateway
        location /api/ {
            proxy_pass         http://api_gateway;
            proxy_set_header   Host              $host;
            proxy_set_header   X-Real-IP         $remote_addr;
            proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header   X-Forwarded-Proto $scheme;
            proxy_read_timeout 60s;
            proxy_connect_timeout 10s;
        }

        # Static Next.js admin portal (if served separately)
        location / {
            proxy_pass http://admin-web:3000;
            proxy_set_header Host $host;
        }
    }

    # ── UAT Admin Portal ──────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name uat.schoolerp.app;

        ssl_certificate     /etc/nginx/ssl/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/privkey.pem;

        location /api/ {
            proxy_pass http://api_gateway;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }

        location / {
            proxy_pass http://admin-web:3000;
        }
    }
}
