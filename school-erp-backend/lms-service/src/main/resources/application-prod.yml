# LMS Service — Production Profile
server:
  port: 8083
spring:
  application:
    name: lms-service
  datasource:
    url: ${DB_URL}
    username: ${DB_USER}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        tenant_identifier_resolver: com.schoolerp.lms.config.tenant.TenantIdentifierResolver
        multi_tenant_connection_provider: com.schoolerp.lms.config.tenant.TenantConnectionProvider
logging:
  level:
    com.schoolerp: INFO
