# ══════════════════════════════════════════════
# LMS Service — Production Spring Profile
# Activated via: SPRING_PROFILES_ACTIVE=prod
# ══════════════════════════════════════════════
server:
  port: ${PORT:8080}

spring:
  application:
    name: lms-service
  datasource:
    # Google Cloud SQL TCP/Socket connection setup
    url: jdbc:postgresql:///${DB_NAME}?cloudSqlInstance=${CLOUD_SQL_INSTANCE}&socketFactory=com.google.cloud.sql.postgres.SocketFactory
    username: ${DB_USER}       # Injected via Cloud Run Secret Manager
    password: ${DB_PASSWORD}   # Injected via Cloud Run Secret Manager
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      # Critical for Cloud Run: Prevents service start failure if DB is initially unavailable
      initialization-fail-timeout: -1 
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: validate      # Disabled runtime table updates, enforced via Flyway
  flyway:
    enabled: true
    baseline-on-migrate: true
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

anthropic:
  routing:
    default-model: claude-3-haiku-20240307
    complex-model: claude-3-5-sonnet-20241022
    enable-escalation: true
    complexity-threshold: 70
  generation:
    max-input-tokens:
      chat: 1200
      explain: 1200
      revise: 1200
      practice: 900
      quiz: 900
    max-output-tokens:
      chat: 400
      explain: 450
      revise: 400
      practice: 250
      quiz: 220
  context:
    max-history-messages: 5
    max-memory-items: 5
    max-syllabus-topics: 8
    max-insight-items: 5
  caching:
    enabled: true
    cache-stable-prefix: true
  quality:
    min-answer-length: 80
  api:
    key: ${ANTHROPIC_API_KEY:}
  client:
    timeout: 5000

ai:
  enabled: false

logging:
  level:
    root: INFO
    com.schoolerp: INFO
    org.springframework.web: WARN
    org.hibernate: WARN
