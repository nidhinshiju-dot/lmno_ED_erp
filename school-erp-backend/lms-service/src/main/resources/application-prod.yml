# ══════════════════════════════════════════════
# LMS Service — Production Spring Profile
# Activated via: SPRING_PROFILES_ACTIVE=prod
# ══════════════════════════════════════════════
server:
  port: ${PORT:8080}

spring:
  application:
    name: lms-service
  datasource:
    # Google Cloud SQL TCP/Socket connection setup
    url: jdbc:postgresql:///${DB_NAME}?cloudSqlInstance=${CLOUD_SQL_INSTANCE}&socketFactory=com.google.cloud.sql.postgres.SocketFactory
    username: ${DB_USER}       # Injected via Cloud Run Secret Manager
    password: ${DB_PASSWORD}   # Injected via Cloud Run Secret Manager
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 10
      minimum-idle: 2
      # Critical for Cloud Run: Prevents service start failure if DB is initially unavailable
      initialization-fail-timeout: -1 
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
  jpa:
    hibernate:
      ddl-auto: update      # UAT/Prod schema generation enabled for Cloud SQL deployment
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect

anthropic:
  api:
    key: ${ANTHROPIC_API_KEY:}

ai:
  enabled: false

logging:
  level:
    root: INFO
    com.schoolerp: INFO
    org.springframework.web: WARN
    org.hibernate: WARN
