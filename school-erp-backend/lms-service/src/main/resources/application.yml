server:
  port: 8082

spring:
  application:
    name: lms-service
  datasource:
    url: jdbc:postgresql://localhost:5432/school_erp
    username: postgres
    password: password
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: none
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        tenant_identifier_resolver: com.schoolerp.lms.config.tenant.TenantIdentifierResolver
        multi_tenant_connection_provider: com.schoolerp.lms.config.tenant.TenantConnectionProvider

anthropic:
  api:
    key: ${ANTHROPIC_API_KEY:default_dev_key}
