# LMS Service — UAT Profile
server:
  port: 8083
spring:
  application:
    name: lms-service
  datasource:
    url: jdbc:postgresql://postgres-uat:5432/school_erp_uat
    username: ${DB_USER:erp_uat_user}
    password: ${DB_PASSWORD:UatPass@2026}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

logging:
  level:
    com.schoolerp: DEBUG
