server:
  port: 8082

spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/school_erp}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
    hikari:
      initialization-fail-timeout: -1
  jpa:
    hibernate:
      ddl-auto: validate
  flyway:
    enabled: true
    baseline-on-migrate: true

ai:
  enabled: ${AI_ENABLED:false}

file:
  storage:
    location: ${FILE_STORAGE_LOCATION:/tmp/lmno-uploads}

services:
  core:
    url: ${CORE_SERVICE_URL:http://localhost:8081}
  fee:
    url: ${FEE_SERVICE_URL:http://localhost:8083}

internal:
  auth:
    secret: ${INTERNAL_AUTH_SECRET:backend-internal-trust-key}
